<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <g id="phoneBody">
      <rect x="-40" y="-80" width="80" height="160" rx="16"/>
    </g>
  </defs>

  <!-- back-left phone -->
  <g transform="translate(88,120) rotate(-15)">
    <use href="#phoneBody" fill="#A9C2B8" stroke="#7FA294" stroke-width="2"/>
  </g>

  <!-- back-right phone -->
  <g transform="translate(152,120) rotate(15)">
    <use href="#phoneBody" fill="#A9C2B8" stroke="#7FA294" stroke-width="2"/>
  </g>

  <!-- hero center phone -->
