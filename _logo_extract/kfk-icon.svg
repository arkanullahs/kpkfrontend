    <use href="#phoneBody" fill="#0E7C66" stroke="#0B5F4F" stroke-width="2"/>
    <circle cx="0" cy="-73" r="2.6" fill="#0B5F4F"/>
    <rect x="-31" y="-68" width="62" height="124" rx="10" fill="#F4FAF7"/>
    <path d="M -15,-7 L -4,5 L 17,-20" fill="none" stroke="#F2A93B" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
