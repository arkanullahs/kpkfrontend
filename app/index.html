<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>কোন ফোন? — budget-first picks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@100..800&family=Space+Grotesk:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f1f0ed; }
    button, input { font-family: inherit; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    ::selection { background: rgba(37,99,217,.16); }
    input[type=range].kb { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; border-radius: 99px; outline: none; cursor: pointer; margin: 0; }
    input[type=range].kb::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 32px; height: 32px; border-radius: 50%; background: #ffffff; box-shadow: 0 2px 6px rgba(15,25,35,.24), 0 0 0 1px rgba(15,25,35,.04), inset 0 0 0 2.5px var(--ac,#2563d9); cursor: grab; border: none; }
    input[type=range].kb::-moz-range-thumb { width: 32px; height: 32px; border-radius: 50%; background: #fff; box-shadow: 0 2px 6px rgba(15,25,35,.24), inset 0 0 0 2.5px var(--ac,#2563d9); cursor: grab; border: none; }
    .ktrait::placeholder { color: #a8acb4; }
    @keyframes kfade { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
